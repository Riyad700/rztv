<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riyad TV — লাইভ বাংলা</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:           #060a10;
  --surface:      #0b1220;
  --surface2:     #0f1929;
  --card:         #101825;
  --card-h:       #141f30;
  --border:       rgba(148,163,184,0.07);
  --border-m:     rgba(148,163,184,0.13);
  --border-s:     rgba(148,163,184,0.22);
  --gold:         #f5a623;
  --gold2:        #ffd166;
  --gold-dim:     rgba(245,166,35,0.12);
  --gold-glow:    rgba(245,166,35,0.28);
  --teal:         #22d3ee;
  --teal-dim:     rgba(34,211,238,0.10);
  --green:        #10b981;
  --green-dim:    rgba(16,185,129,0.12);
  --red:          #f87171;
  --text:         #e8edf5;
  --muted:        #5b7fa6;
  --muted2:       #364f6b;
  --radius:       14px;
  --radius-sm:    8px;
  --shadow:       0 8px 32px rgba(0,0,0,0.5);
  --glow-gold:    0 0 20px rgba(245,166,35,0.3);
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', system-ui, sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  background-image:
    radial-gradient(ellipse 120% 60% at 50% -5%, rgba(34,211,238,0.04) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 100% 80%, rgba(245,166,35,0.03) 0%, transparent 50%);
}

/* ═══════════════════════════════════════
   HEADER
═══════════════════════════════════════ */
.header {
  position: sticky;
  top: 0;
  z-index: 200;
  background: rgba(6,10,16,0.92);
  backdrop-filter: blur(20px) saturate(1.4);
  -webkit-backdrop-filter: blur(20px) saturate(1.4);
  border-bottom: 1px solid var(--border);
  padding: 0 12px;
  min-height: 52px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: nowrap;
}

.header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent 0%, rgba(245,166,35,0.18) 30%, rgba(34,211,238,0.14) 70%, transparent 100%);
}

.logo-mark {
  position: relative;
  width: 28px; height: 28px;
  flex-shrink: 0;
  display: none;
}
@media (min-width: 360px) { .logo-mark { display: block; } }
.logo-mark-ring {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  border: 1.5px solid rgba(245,166,35,0.35);
  animation: spinSlow 8s linear infinite;
}
.logo-mark-ring::before {
  content: '';
  position: absolute;
  top: -2px; left: 50%; transform: translateX(-50%);
  width: 5px; height: 5px;
  background: var(--gold);
  border-radius: 50%;
  box-shadow: 0 0 8px var(--gold);
}
.logo-mark-inner {
  position: absolute;
  inset: 5px;
  border-radius: 50%;
  background: linear-gradient(135deg, rgba(245,166,35,0.2), rgba(34,211,238,0.1));
  border: 1px solid rgba(245,166,35,0.2);
}
@keyframes spinSlow { to { transform: rotate(360deg); } }

.logo-text {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 19px;
  letter-spacing: 2px;
  color: var(--text);
  line-height: 1;
  flex-shrink: 0;
}
.logo-text em {
  font-style: normal;
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.header-live-pill {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 1px;
  color: var(--green);
  background: var(--green-dim);
  border: 1px solid rgba(16,185,129,0.22);
  padding: 3px 7px;
  border-radius: 20px;
  flex-shrink: 0;
}
.header-live-pill .dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 8px rgba(16,185,129,0.7);
  animation: blink 1.8s ease-in-out infinite;
}
@keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

.header-count {
  font-size: 10px;
  color: var(--muted);
  font-weight: 500;
  letter-spacing: 0.3px;
  background: rgba(148,163,184,0.06);
  border: 1px solid var(--border-m);
  padding: 3px 10px;
  border-radius: 20px;
  display: none;
}
@media (min-width: 420px) { .header-count { display: block; } }

/* ═══════════════════════════════════════
   LAYOUT
═══════════════════════════════════════ */
.main-layout {
  display: flex;
  flex-direction: column;
}
@media (min-width: 900px) {
  .main-layout {
    display: grid;
    grid-template-columns: 1fr 380px;
    min-height: calc(100vh - 52px);
  }
  .sidebar {
    border-left: 1px solid var(--border);
    overflow-y: auto;
    max-height: calc(100vh - 52px);
    position: sticky;
    top: 52px;
  }
}

/* ═══════════════════════════════════════
   PLAYER SECTION
═══════════════════════════════════════ */
.player-section {
  position: sticky;
  top: 52px;
  z-index: 100;
  background: var(--bg);
}

.player-wrap {
  background: #000;
  position: relative;
  aspect-ratio: 16/9;
  width: 100%;
  max-height: 240px;
  overflow: hidden;
}
@media (min-width: 600px) { .player-wrap { max-height: 360px; } }
@media (min-width: 900px) { .player-wrap { max-height: none; } }

video {
  width: 100%; height: 100%;
  display: block;
  background: #000;
}

/* Cinematic corner accents on video */
.player-corner {
  position: absolute;
  width: 18px; height: 18px;
  pointer-events: none;
  opacity: 0.7;
}
.player-corner.tl { top: 10px; left: 10px; border-top: 2px solid var(--gold); border-left: 2px solid var(--gold); }
.player-corner.tr { top: 10px; right: 10px; border-top: 2px solid var(--gold); border-right: 2px solid var(--gold); }
.player-corner.bl { bottom: 10px; left: 10px; border-bottom: 2px solid var(--gold); border-left: 2px solid var(--gold); }
.player-corner.br { bottom: 10px; right: 10px; border-bottom: 2px solid var(--gold); border-right: 2px solid var(--gold); }

.player-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}
.spinner {
  width: 42px; height: 42px;
  border: 2px solid rgba(245,166,35,0.1);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  display: none;
  filter: drop-shadow(0 0 10px var(--gold));
}
@keyframes spin { to { transform: rotate(360deg); } }
.spinner.active { display: block; }

/* ── Now Playing Bar ── */
.now-playing-bar {
  background: linear-gradient(180deg, rgba(15,25,41,0.95) 0%, rgba(11,18,32,0.98) 100%);
  backdrop-filter: blur(8px);
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 11px;
  border-bottom: 1px solid var(--border);
  position: relative;
}
.now-playing-bar::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(245,166,35,0.25), rgba(34,211,238,0.15), transparent);
}

.channel-logo-sm {
  width: 38px; height: 38px;
  border-radius: 10px;
  object-fit: contain;
  background: rgba(255,255,255,0.04);
  padding: 3px;
  flex-shrink: 0;
  border: 1px solid var(--border-m);
}
.channel-logo-sm.placeholder {
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 800;
  color: var(--gold);
  background: var(--gold-dim);
  border: 1px solid rgba(245,166,35,0.22);
  font-family: 'Bebas Neue', sans-serif;
  letter-spacing: 1px;
}

.now-info { flex: 1; min-width: 0; }
.now-name {
  font-size: 13px; font-weight: 700;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  color: var(--text);
  letter-spacing: 0.2px;
}
.now-status {
  font-size: 10px; color: var(--muted);
  display: flex; align-items: center; gap: 5px; margin-top: 2px;
  letter-spacing: 0.3px;
}
.live-dot {
  width: 6px; height: 6px;
  background: var(--green);
  border-radius: 50%;
  flex-shrink: 0;
  box-shadow: 0 0 7px rgba(16,185,129,0.7);
  animation: blink 2s ease-in-out infinite;
}
.live-dot.error {
  background: var(--red);
  box-shadow: 0 0 7px rgba(248,113,113,0.7);
  animation: none;
}

/* ── Quality Button ── */
.quality-wrap { position: relative; flex-shrink: 0; }
.quality-btn {
  background: transparent;
  border: 1px solid rgba(245,166,35,0.28);
  color: var(--gold);
  font-size: 9px; font-weight: 800;
  padding: 4px 9px; border-radius: var(--radius-sm);
  cursor: pointer; letter-spacing: 1px;
  transition: all 0.2s;
  font-family: 'Inter', monospace;
  text-transform: uppercase;
}
.quality-btn:hover {
  background: var(--gold-dim);
  box-shadow: 0 0 12px var(--gold-glow);
}
.quality-btn.hidden { display: none; }

.quality-menu {
  display: none;
  position: absolute;
  bottom: calc(100% + 8px);
  right: 0;
  background: #0d1a28;
  border: 1px solid var(--border-s);
  border-radius: 12px;
  overflow: hidden;
  min-width: 140px;
  box-shadow: var(--shadow), 0 0 0 1px rgba(34,211,238,0.04);
  z-index: 300;
}
.quality-menu.open { display: block; }
.quality-menu-title {
  font-size: 9px; color: var(--muted2);
  padding: 9px 13px 5px;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  border-bottom: 1px solid var(--border);
  font-weight: 700;
}
.quality-item {
  padding: 9px 13px; font-size: 13px;
  cursor: pointer; display: flex; align-items: center; gap: 8px;
  transition: background 0.15s; color: var(--muted);
}
.quality-item:hover { background: var(--teal-dim); color: var(--text); }
.quality-item.active { color: var(--gold); }
.quality-check { width: 14px; font-size: 11px; flex-shrink: 0; }

/* ── Fullscreen Button ── */
.fullscreen-btn {
  background: rgba(148,163,184,0.05);
  border: 1px solid var(--border-m);
  color: var(--muted);
  cursor: pointer;
  font-size: 16px;
  padding: 5px 8px;
  border-radius: var(--radius-sm);
  transition: all 0.2s;
  flex-shrink: 0;
  line-height: 1;
}
.fullscreen-btn:hover {
  color: var(--teal);
  border-color: rgba(34,211,238,0.3);
  background: var(--teal-dim);
}

/* ── Error Banner ── */
.err-banner {
  background: rgba(248,113,113,0.06);
  border-bottom: 1px solid rgba(248,113,113,0.18);
  color: #fca5a5;
  font-size: 12px;
  padding: 8px 14px;
  display: none;
  align-items: center;
  gap: 8px;
}
.err-banner.show { display: flex; }
.retry-btn {
  margin-left: auto;
  background: rgba(248,113,113,0.1);
  border: 1px solid rgba(248,113,113,0.25);
  color: #fca5a5;
  font-size: 11px; font-weight: 600;
  padding: 4px 12px;
  border-radius: 6px;
  cursor: pointer;
  letter-spacing: 0.3px;
  transition: all 0.2s;
}
.retry-btn:hover { background: rgba(248,113,113,0.18); }

/* ═══════════════════════════════════════
   SIDEBAR: TABS
═══════════════════════════════════════ */
.tabs {
  display: flex;
  gap: 0;
  padding: 0 12px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  scrollbar-width: none;
  position: sticky;
  top: 0;
  z-index: 10;
}
.tabs::-webkit-scrollbar { display: none; }

.tab {
  padding: 12px 14px;
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  white-space: nowrap;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  flex-shrink: 0;
  letter-spacing: 0.3px;
  position: relative;
}
.tab.active {
  color: var(--gold);
  border-bottom-color: var(--gold);
}
.tab.active::after {
  content: '';
  position: absolute;
  bottom: 0; left: 14px; right: 14px;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  filter: blur(2px);
  border-radius: 2px;
}
.tab:hover:not(.active) { color: var(--text); }

/* ═══════════════════════════════════════
   CHANNEL GRID
═══════════════════════════════════════ */
.channels {
  padding: 10px 10px 80px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 7px;
}
@media (min-width: 600px) and (max-width: 899px) {
  .channels { grid-template-columns: repeat(3, 1fr); }
}

/* ── Channel Card ── */
.ch-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 11px 12px;
  cursor: pointer;
  transition: all 0.22s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex;
  align-items: center;
  gap: 10px;
  position: relative;
  overflow: hidden;
  animation: cardIn 0.35s ease both;
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Shimmer on hover */
.ch-card::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(125deg,
    transparent 30%,
    rgba(245,166,35,0.04) 50%,
    transparent 70%);
  transform: translateX(-100%);
  transition: transform 0.45s ease;
}
.ch-card:hover::after { transform: translateX(100%); }

.ch-card:hover {
  border-color: var(--border-s);
  background: var(--card-h);
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(0,0,0,0.35);
}
.ch-card:active { transform: scale(0.97); transition-duration: 0.1s; }

/* Selected state */
.ch-card.selected {
  border-color: rgba(245,166,35,0.45);
  background: rgba(245,166,35,0.05);
  box-shadow: 0 0 0 1px rgba(245,166,35,0.12), 0 6px 24px rgba(245,166,35,0.07);
}
.ch-card.selected::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px; height: 100%;
  background: linear-gradient(180deg, var(--gold), var(--gold2), rgba(245,166,35,0.3));
  border-radius: 3px 0 0 3px;
}

.ch-logo {
  width: 40px; height: 40px;
  border-radius: 9px;
  object-fit: contain;
  background: rgba(255,255,255,0.04);
  padding: 4px;
  flex-shrink: 0;
  border: 1px solid rgba(255,255,255,0.05);
}
.ch-logo-placeholder {
  width: 40px; height: 40px;
  border-radius: 9px;
  background: linear-gradient(135deg, rgba(245,166,35,0.12), rgba(34,211,238,0.06));
  border: 1px solid rgba(245,166,35,0.18);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 800;
  color: var(--gold);
  flex-shrink: 0;
  font-family: 'Bebas Neue', sans-serif;
  letter-spacing: 1px;
}
.ch-info { min-width: 0; flex: 1; }
.ch-name {
  font-size: 12px; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  color: var(--text);
  letter-spacing: 0.1px;
}
.ch-cat {
  font-size: 9px; color: var(--muted);
  margin-top: 3px;
  letter-spacing: 0.4px;
  text-transform: uppercase;
  font-weight: 500;
}

/* LIVE badge */
.ch-badge {
  font-size: 7px;
  font-weight: 800;
  padding: 2px 6px;
  border-radius: 20px;
  background: var(--green-dim);
  color: var(--green);
  letter-spacing: 1px;
  border: 1px solid rgba(16,185,129,0.2);
  flex-shrink: 0;
  font-family: 'Inter', sans-serif;
}

/* ═══════════════════════════════════════
   SPLASH SCREEN
═══════════════════════════════════════ */
#splash {
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 32px;
  transition: opacity 0.7s ease, visibility 0.7s ease;
  overflow: hidden;
}
#splash.hidden {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}

/* Ambient background rings */
.splash-ambient {
  position: absolute;
  inset: 0;
  pointer-events: none;
}
.splash-ambient::before {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 500px; height: 500px;
  border-radius: 50%;
  background: radial-gradient(ellipse,
    rgba(245,166,35,0.05) 0%,
    rgba(34,211,238,0.03) 40%,
    transparent 65%);
  animation: ambientPulse 4s ease-in-out infinite;
}
.splash-ambient::after {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 800px; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(245,166,35,0.08), rgba(34,211,238,0.06), transparent);
  animation: scanLine 3s ease-in-out infinite;
}
@keyframes ambientPulse {
  0%,100% { transform: translate(-50%,-50%) scale(1); opacity: 0.8; }
  50%      { transform: translate(-50%,-50%) scale(1.2); opacity: 0.5; }
}
@keyframes scanLine {
  0%   { transform: translate(-50%, calc(-50% - 120px)); opacity: 0; }
  20%  { opacity: 1; }
  80%  { opacity: 1; }
  100% { transform: translate(-50%, calc(-50% + 120px)); opacity: 0; }
}

/* Logo */
.splash-logo {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  animation: riseIn 0.8s cubic-bezier(0.2,0.8,0.3,1) both;
  position: relative;
}
.splash-logo-text {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 52px;
  letter-spacing: 8px;
  color: var(--text);
  line-height: 1;
  position: relative;
}
.splash-logo-text em {
  font-style: normal;
  background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 50%, var(--gold) 100%);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: shimmer 2.5s linear infinite;
}
@keyframes shimmer {
  0%   { background-position: 0% center; }
  100% { background-position: 200% center; }
}
.splash-tagline {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 3px;
  text-transform: uppercase;
  font-weight: 500;
}
.splash-logo-line {
  width: 60px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 2px 0;
  opacity: 0.6;
}

/* Loader */
.splash-loader {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  animation: riseIn 0.8s 0.15s cubic-bezier(0.2,0.8,0.3,1) both;
}

.splash-rings {
  position: relative;
  width: 68px; height: 68px;
}
.splash-rings span {
  position: absolute;
  border-radius: 50%;
  border: 1.5px solid transparent;
}
.splash-rings span:nth-child(1) {
  inset: 0;
  border-top-color: var(--gold);
  animation: ringSpin 1.2s linear infinite;
}
.splash-rings span:nth-child(2) {
  inset: 9px;
  border-right-color: var(--teal);
  animation: ringSpin 0.9s linear infinite reverse;
}
.splash-rings span:nth-child(3) {
  inset: 18px;
  border-bottom-color: rgba(245,166,35,0.4);
  animation: ringSpin 1.6s linear infinite;
}
.splash-rings-center {
  position: absolute;
  inset: 0;
  display: flex; align-items: center; justify-content: center;
}
.splash-rings-center::after {
  content: '';
  width: 9px; height: 9px;
  border-radius: 50%;
  background: var(--gold);
  box-shadow: 0 0 14px var(--gold), 0 0 28px rgba(245,166,35,0.3);
  animation: dotPulse 1.2s ease-in-out infinite;
}
@keyframes ringSpin { to { transform: rotate(360deg); } }
@keyframes dotPulse {
  0%,100% { transform: scale(1); opacity: 0.9; }
  50%      { transform: scale(1.4); opacity: 0.6; }
}
@keyframes riseIn {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

.splash-text {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 1.8px;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 5px;
  font-weight: 500;
}
.dot-anim span {
  display: inline-block;
  animation: dotBounce 1.2s ease-in-out infinite;
  font-size: 18px; line-height: 1;

const CATS = ["সব", ...new Set(CHANNELS.map(c => c.cat))];
let activeCat = "সব";
let currentIdx = -1;
let hlsInstance = null;
let selectedLevel = -1;

const video = document.getElementById("player");
const spinner = document.getElementById("spinner");
const npName = document.getElementById("np-name");
const npStatus = document.getElementById("np-status");
const liveDot = document.getElementById("live-dot");
const errBanner = document.getElementById("err-banner");
const npLogoWrap = document.getElementById("np-logo-wrap");

document.getElementById("ch-count").textContent = CHANNELS.length + " চ্যানেল";

function buildTabs() {
  const tabsEl = document.getElementById("tabs");
  tabsEl.innerHTML = CATS.map(c =>
    `<div class="tab${c===activeCat?' active':''}" onclick="switchCat('${c}')">${c}</div>`
  ).join("");
}

function switchCat(cat) {
  activeCat = cat;
  buildTabs();
  buildGrid();
}

function getInitials(name) {
  return name.replace(/TV|তিভি/gi,"").trim().slice(0,3).toUpperCase();
}

function buildGrid() {
  const list = activeCat === "সব" ? CHANNELS : CHANNELS.filter(c => c.cat === activeCat);
  const el = document.getElementById("channels");
  el.innerHTML = list.map((ch) => {
    const realIdx = CHANNELS.indexOf(ch);
    const sel = realIdx === currentIdx;
    const logoHtml = ch.logo
      ? `<img class="ch-logo" src="${ch.logo}" onerror="this.style.display='none';this.nextSibling.style.display='flex'" loading="lazy"><div class="ch-logo-placeholder" style="display:none">${getInitials(ch.name)}</div>`
      : `<div class="ch-logo-placeholder">${getInitials(ch.name)}</div>`;
    return `<div class="ch-card${sel?' selected':''}" onclick="playChannel(${realIdx})" style="animation-delay:${(list.indexOf(ch)*0.03).toFixed(2)}s">
      ${logoHtml}
      <div class="ch-info">
        <div class="ch-name">${ch.name}</div>
        <div class="ch-cat">${ch.cat}</div>
      </div>
      <div class="ch-badge">LIVE</div>
    </div>`;
  }).join("");
}

function buildQualityMenu(levels) {
  const btn = document.getElementById("quality-btn");
  const menu = document.getElementById("quality-menu");
  if (!levels || levels.length <= 1) { btn.classList.add("hidden"); return; }
  btn.classList.remove("hidden");
  selectedLevel = -1;
  updateQualityBtn();
  const items = [{ label: "অটো", level: -1 }, ...levels.map((l, i) => ({
    label: l.height ? l.height + "p" : "লেভেল " + (i + 1), level: i
  }))];
  menu.innerHTML = `<div class="quality-menu-title">মান নির্বাচন</div>` +
    items.map(item => `
      <div class="quality-item${item.level === selectedLevel ? ' active' : ''}" onclick="setQuality(${item.level})">
        <span class="quality-check">${item.level === selectedLevel ? '✓' : ''}</span>
        ${item.label}
      </div>`).join("");
}

function updateQualityBtn() {
  const btn = document.getElementById("quality-btn");
  if (selectedLevel === -1) { btn.textContent = "AUTO ▾"; btn.style.color = ""; }
  else if (hlsInstance && hlsInstance.levels[selectedLevel]) {
    const h = hlsInstance.levels[selectedLevel].height;
    btn.textContent = (h ? h + "p" : "L" + (selectedLevel+1)) + " ▾";
    btn.style.color = "var(--gold)";
  }
}

function setQuality(level) {
  selectedLevel = level;
  if (hlsInstance) hlsInstance.currentLevel = level;
  updateQualityBtn();
  if (hlsInstance) buildQualityMenu(hlsInstance.levels);
  document.getElementById("quality-menu").classList.remove("open");
}

function toggleQualityMenu() {
  document.getElementById("quality-menu").classList.toggle("open");
}

function resetQuality() {
  selectedLevel = -1;
  const btn = document.getElementById("quality-btn");
  btn.classList.add("hidden");
  btn.textContent = "AUTO ▾";
  btn.style.color = "";
  const menu = document.getElementById("quality-menu");
  menu.classList.remove("open");
  menu.innerHTML = "";
}

document.addEventListener("click", (e) => {
  if (!document.getElementById("quality-wrap").contains(e.target))
    document.getElementById("quality-menu").classList.remove("open");
});

function setStatus(msg, isErr=false) {
  npStatus.textContent = msg;
  liveDot.className = "live-dot" + (isErr?" error":"");
}

function showNowPlaying(ch) {
  npName.textContent = ch.name;
  npLogoWrap.innerHTML = ch.logo
    ? `<img class="channel-logo-sm" src="${ch.logo}" onerror="this.style.display='none'" loading="lazy">`
    : `<div class="channel-logo-sm placeholder">${getInitials(ch.name)}</div>`;
}

function retry() { if (currentIdx >= 0) playChannel(currentIdx); }

function playChannel(idx, onReady) {
  if (idx === currentIdx && hlsInstance && !onReady) return;
  currentIdx = idx;
  const ch = CHANNELS[idx];
  errBanner.classList.remove("show");
  resetQuality();
  if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
  showNowPlaying(ch);
  setStatus("লোড হচ্ছে...");
  spinner.classList.add("active");
  buildGrid();

  const urls = [ch.url, ...(ch.backup || [])].filter(Boolean);
  let urlIdx = 0;

  function tryNext() {
    if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
    const streamUrl = urls[urlIdx];
    if (!streamUrl) {
      spinner.classList.remove("active");
      setStatus("সংযোগ ব্যর্থ ❌", true);
      errBanner.classList.add("show");
      if (onReady) onReady();
      return;
    }
    if (Hls.isSupported()) {
      hlsInstance = new Hls({ enableWorker:true, lowLatencyMode:true, backBufferLength:30 });
      hlsInstance.loadSource(streamUrl);
      hlsInstance.attachMedia(video);
      hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
        spinner.classList.remove("active");
        setStatus(urlIdx === 0 ? "লাইভ সম্প্রচার" : "লাইভ (ব্যাকআপ " + urlIdx + ")");
        buildQualityMenu(hlsInstance.levels);
        if (selectedLevel !== -1) hlsInstance.currentLevel = selectedLevel;
        video.play().catch(()=>{});
        if (onReady) onReady();
      });
      hlsInstance.on(Hls.Events.ERROR, (e, data) => {
        if (data.fatal) {
          urlIdx++;
          if (urlIdx < urls.length) {
            setStatus("বিকল্প সার্ভার " + urlIdx + " চেষ্টা করছে...");
            setTimeout(tryNext, 400);
          } else {
            spinner.classList.remove("active");
            setStatus("সংযোগ ব্যর্থ ❌", true);
            errBanner.classList.add("show");
            if (onReady) onReady();
          }
        }
      });
    } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
      video.src = streamUrl;
      video.addEventListener("loadedmetadata", () => {
        spinner.classList.remove("active");
        setStatus("লাইভ সম্প্রচার");
        video.play().catch(()=>{});
        if (onReady) onReady();
      }, {once:true});
      video.addEventListener("error", () => {
        urlIdx++;
        if (urlIdx < urls.length) tryNext();
        else {
          spinner.classList.remove("active");
          setStatus("সংযোগ ব্যর্থ ❌", true);
          errBanner.classList.add("show");
          if (onReady) onReady();
        }
      }, {once:true});
    } else {
      spinner.classList.remove("active");
      setStatus("ব্রাউজার সাপোর্ট নেই", true);
      if (onReady) onReady();
    }
  }
  tryNext();
}

function toggleFS() {
  const pw = document.querySelector(".player-wrap");
  if (!document.fullscreenElement) pw.requestFullscreen().catch(()=>{});
  else document.exitFullscreen();
}

buildTabs();
buildGrid();

document.getElementById("splash-hint").textContent = CHANNELS.length + "টি চ্যানেল প্রস্তুত হচ্ছে";
let splashDismissed = false;
function safeDismissSplash() {
  if (splashDismissed) return;
  splashDismissed = true;
  splash.classList.add("hidden");
}
const splashTimeout = setTimeout(safeDismissSplash, 4000);
playChannel(0, () => { clearTimeout(splashTimeout); safeDismissSplash(); });

const EMBED_SOURCES = [
  { id:"vidsrc",       name:"Server 1", fn: (id) => `https://vidsrc.to/embed/movie/${id}` },
  { id:"vidsrc2",      name:"Server 2", fn: (id) => `https://vidsrc.cc/v2/embed/movie/${id}` },
  { id:"smashystream", name:"Server 3", fn: (id) => `https://embed.smashystream.com/playere.php?tmdb=${id}` },
  { id:"autoembed",    name:"Server 4", fn: (id) => `https://player.autoembed.cc/embed/movie/${id}` },
];

// Fallback external links
const STREAM_PLATFORMS = [
  { name:"YouTube",   icon:"🔴", url:"https://www.youtube.com/results?search_query={title}+full+movie", sub:"Free on YouTube" },
  { name:"JioCinema", icon:"🟣", url:"https://www.jiocinema.com/search?q={title}", sub:"Free · Bollywood & Hindi" },
  { name:"Hotstar",   icon:"🔵", url:"https://www.hotstar.com/in/search?q={title}", sub:"Disney+ Hotstar" },
  { name:"MX Player", icon:"🟠", url:"https://www.mxplayer.in/search?query={title}", sub:"Free streaming" },
];

let activeGenreId = "all";
let movieSearchMode = false;
let currentMovieList = [];

function showSection(sec) {
  const liveEl = document.querySelector(".main-layout");
  const movieEl = document.getElementById("movie-section");
  const navLive = document.getElementById("nav-live");
  const navMovies = document.getElementById("nav-movies");

  if (sec === "live") {
    liveEl.style.display = "";
    movieEl.classList.remove("visible");
    navLive.classList.add("active");
    navMovies.classList.remove("active");
  } else {
    liveEl.style.display = "none";
    movieEl.classList.add("visible");
    navLive.classList.remove("active");
    navMovies.classList.add("active");
    if (currentMovieList.length === 0) initMovies();
  }
}

function buildGenreTabs() {
  const el = document.getElementById("movie-genre-tabs");
  el.innerHTML = MOVIE_GENRES.map(g =>
    `<div class="movie-gtab${g.id===activeGenreId?' active':''}" onclick="switchGenre('${g.id}')">${g.name}</div>`
  ).join("");
}

function switchGenre(gid) {
  activeGenreId = gid;
  movieSearchMode = false;
  document.getElementById("movie-search-input").value = "";
  buildGenreTabs();
  loadMoviesByGenre(gid);
}

async function initMovies() {
  buildGenreTabs();
  await loadMoviesByGenre("all");
}

function showMovieLoading() {
  document.getElementById("movie-content-area").innerHTML =
    `<div class="movie-loading"><div class="mini-spinner"></div>লোড হচ্ছে…</div>`;
}

async function loadMoviesByGenre(gid) {
  showMovieLoading();
  try {
    let url;
    if (gid === "all") {
      url = `${TMDB_BASE}/discover/movie?api_key=${TMDB_KEY}&with_original_language=hi&sort_by=popularity.desc&page=1`;
    } else {
      url = `${TMDB_BASE}/discover/movie?api_key=${TMDB_KEY}&with_original_language=hi&with_genres=${gid}&sort_by=popularity.desc&page=1`;
    }
    const res = await fetch(url);
    const data = await res.json();
    currentMovieList = data.results || [];
    renderMovieGrid(currentMovieList, gid === "all" ? "🔥 জনপ্রিয় Bollywood Movies" : "");
  } catch(e) {
    document.getElementById("movie-content-area").innerHTML =
      `<div class="movie-no-results"><div class="icon">📡</div>লোড হয়নি। নেট চেক করুন।</div>`;
  }
}

async function searchMovies() {
  const q = document.getElementById("movie-search-input").value.trim();
  if (!q) return;
  movieSearchMode = true;
  activeGenreId = "all";
  buildGenreTabs();
  showMovieLoading();
  try {
    const url = `${TMDB_BASE}/search/movie?api_key=${TMDB_KEY}&query=${encodeURIComponent(q)}&language=en-US&page=1`;
    const res = await fetch(url);
    const data = await res.json();
    currentMovieList = data.results || [];
    renderMovieGrid(currentMovieList, `"${q}" — ফলাফল`);
  } catch(e) {
    document.getElementById("movie-content-area").innerHTML =
      `<div class="movie-no-results"><div class="icon">😕</div>খোঁজা যায়নি।</div>`;
  }
}

function renderMovieGrid(movies, label) {
  const area = document.getElementById("movie-content-area");
  if (!movies.length) {
    area.innerHTML = `<div class="movie-no-results"><div class="icon">🎬</div>কোনো মুভি পাওয়া যায়নি।</div>`;
    return;
  }
  const cards = movies.map((m, i) => {
    const poster = m.poster_path
      ? `<img class="movie-poster" src="${TMDB_IMG}${m.poster_path}" loading="lazy" onerror="this.style.display='none';this.nextSibling.style.display='flex'">`
      : ``;
    const ph = `<div class="movie-poster-placeholder" ${m.poster_path?'style="display:none"':''}>🎬</div>`;
    const year = m.release_date ? m.release_date.slice(0,4) : "";
    const rating = m.vote_average ? "⭐ " + m.vote_average.toFixed(1) : "";
    return `<div class="movie-card" onclick="openMovieModal(${m.id})" style="animation-delay:${(i*0.03).toFixed(2)}s">
      ${poster}${ph}
      <div class="movie-card-info">
        <div class="movie-card-title">${m.title||m.original_title}</div>
        <div class="movie-card-meta">
          ${year ? `<span class="movie-card-year">${year}</span>` : ""}
          ${rating ? `<span class="movie-card-rating">${rating}</span>` : ""}
        </div>
      </div>
    </div>`;
  }).join("");

  area.innerHTML = `
    ${label ? `<div class="movie-section-label">${label}</div>` : ""}
    <div class="movie-grid">${cards}</div>`;
}

let activeEmbedSrc = 0;
let currentEmbedMovieId = null;

function buildEmbedPlayer(movieId, srcIdx) {
  const src = EMBED_SOURCES[srcIdx];
  const url = src.fn(movieId);
  const srcBtns = EMBED_SOURCES.map((s, i) =>
    `<button class="movie-src-btn${i===srcIdx?' active':''}" onclick="switchEmbedSrc(${i},'${movieId}')">${s.name}</button>`
  ).join("");
  return `
    <div class="movie-src-row">
      <span class="movie-src-label">সার্ভার:</span>
      ${srcBtns}
    </div>
    <div class="movie-player-wrap" id="embed-player-wrap" data-movie-id="${movieId}">
      <div class="movie-player-loading" id="embed-loading">
        <div class="mini-spinner"></div>
        <span>প্লেয়ার লোড হচ্ছে…</span>
      </div>
      <iframe id="embed-iframe"
        src="${url}"
        allowfullscreen
        webkitallowfullscreen
        mozallowfullscreen
        allow="autoplay; fullscreen *; picture-in-picture; encrypted-media; web-share"
        referrerpolicy="no-referrer-when-downgrade"
        onload="document.getElementById('embed-loading').classList.add('hide')"
        style="position:absolute;top:0;left:0;width:100%;height:100%;border:none;border-radius:12px;">
      </iframe>
      <button class="movie-embed-fs-btn" title="ফুলস্ক্রিন" onclick="embedFullscreen()">⛶</button>
    </div>`;
}

function switchEmbedSrc(idx, movieIdFromBtn) {
  activeEmbedSrc = idx;
  // Use movie ID from button arg (most reliable), else fall back to global
  const movieId = movieIdFromBtn || currentEmbedMovieId ||
    (document.getElementById("embed-player-wrap") && document.getElementById("embed-player-wrap").dataset.movieId);
  if (!movieId) return;
  currentEmbedMovieId = movieId; // keep global in sync
  const wrap = document.getElementById("embed-player-wrap");
  if (!wrap) return;
  const loading = document.getElementById("embed-loading");
  const iframe = document.getElementById("embed-iframe");
  if (loading) { loading.classList.remove("hide"); loading.style.opacity = "1"; }
  if (iframe) {
    // Reset src briefly to force reload on same URL edge case
    iframe.src = "about:blank";
    setTimeout(() => {
      iframe.src = EMBED_SOURCES[idx].fn(movieId);
    }, 80);
  }
  // Update active button highlight
  document.querySelectorAll(".movie-src-btn").forEach((b, i) => {
    b.classList.toggle("active", i === idx);
  });
}

function embedFullscreen() {
  const iframe = document.getElementById("embed-iframe");
  if (!iframe) return;
  const req = iframe.requestFullscreen || iframe.webkitRequestFullscreen || iframe.mozRequestFullScreen || iframe.msRequestFullscreen;
  if (req) req.call(iframe);
}

async function openMovieModal(movieId) {
  currentEmbedMovieId = movieId;
  activeEmbedSrc = 0;
  const overlay = document.getElementById("movie-modal-overlay");
  const inner = document.getElementById("movie-modal-inner");
  inner.innerHTML = `<div class="movie-loading" style="min-height:200px"><div class="mini-spinner"></div>লোড হচ্ছে…</div>`;
  overlay.classList.add("open");

  try {
    const res = await fetch(`${TMDB_BASE}/movie/${movieId}?api_key=${TMDB_KEY}&language=en-US`);
    const m = await res.json();

    const year = m.release_date ? m.release_date.slice(0,4) : "";
    const rating = m.vote_average ? m.vote_average.toFixed(1) : "";
    const lang = m.original_language === "hi" ? "Hindi" : m.original_language === "bn" ? "Bengali" : (m.original_language||"").toUpperCase();
    const genres = (m.genres||[]).slice(0,3).map(g => `<span class="movie-badge badge-genre">${g.name}</span>`).join("");
    const title = m.title || m.original_title;

    const streamBtns = STREAM_PLATFORMS.map(p => {
      const link = p.url.replace("{title}", encodeURIComponent(title));
      return `<a class="stream-btn" href="${link}" target="_blank" rel="noopener">
        <span class="stream-btn-icon">${p.icon}</span>
        <div class="stream-btn-info">
          <div class="stream-btn-name">${p.name}</div>
          <div class="stream-btn-sub">${p.sub}</div>
        </div>
        <span class="stream-btn-arrow">↗</span>
      </a>`;
    }).join("");

    inner.innerHTML = `
      <div class="movie-modal-body">
        <div class="movie-modal-title">${title}</div>
        ${m.tagline ? `<div class="movie-modal-tagline">"${m.tagline}"</div>` : ""}
        <div class="movie-modal-badges">
          ${year ? `<span class="movie-badge badge-year">${year}</span>` : ""}
          ${rating ? `<span class="movie-badge badge-rating">⭐ ${rating}/10</span>` : ""}
          ${lang ? `<span class="movie-badge badge-lang">${lang}</span>` : ""}
          ${genres}
        </div>
        ${m.overview ? `<div class="movie-modal-overview">${m.overview}</div>` : ""}

        <!-- ▶ Built-in Embed Player -->
        ${buildEmbedPlayer(movieId, 0)}

        <!-- Fallback external links -->
        <div class="movie-stream-section">
          <div class="movie-stream-label">🔗 অন্য প্ল্যাটফর্মে দেখুন</div>
          <div class="movie-stream-btns">${streamBtns}</div>
        </div>
      </div>`;
  } catch(e) {
    inner.innerHTML = `<div class="movie-no-results" style="min-height:180px"><div class="icon">😕</div>তথ্য লোড হয়নি।</div>`;
  }
}

function closeMovieModal(e) {
  if (e.target === document.getElementById("movie-modal-overlay"))
    document.getElementById("movie-modal-overlay").classList.remove("open");
}
function closeMovieModalBtn() {
  document.getElementById("movie-modal-overlay").classList.remove("open");
}
</script>
</body>
</html>
