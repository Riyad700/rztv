<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riyad TV</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #070d14;
    --surface: #0d1520;
    --card: #111d2b;
    --card-hover: #162234;
    --border: rgba(99,179,237,0.10);
    --border-strong: rgba(99,179,237,0.22);
    --accent: #f6ad3c;
    --accent-dim: rgba(246,173,60,0.15);
    --accent-glow: rgba(246,173,60,0.35);
    --teal: #38bdf8;
    --teal-dim: rgba(56,189,248,0.12);
    --text: #e2eaf4;
    --muted: #5a7a9a;
    --muted2: #3d5a78;
    --green: #34d399;
    --red: #f87171;
    --green-dim: rgba(52,211,153,0.15);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(56,189,248,0.06) 0%, transparent 70%);
  }

  /* ── Header ── */
  .header {
    background: rgba(13,21,32,0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 13px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo-dot {
    width: 9px; height: 9px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--accent-glow);
    animation: pulse 2s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes pulse {
    0%,100% { opacity:1; box-shadow: 0 0 8px var(--accent-glow); }
    50% { opacity:0.6; box-shadow: 0 0 14px var(--accent-glow); }
  }
  .header-title {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 1.5px;
    color: var(--text);
    text-transform: uppercase;
    font-style: italic;
  }
  .header-title span {
    font-style: normal;
    font-weight: 900;
    letter-spacing: 2px;
    background: linear-gradient(135deg, #f6ad3c, #ffd580);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
  }
  .header-sub {
    font-size: 11px;
    color: var(--muted);
    margin-left: auto;
    background: var(--teal-dim);
    border: 1px solid rgba(56,189,248,0.18);
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.3px;
  }

  /* ── Player ── */
  .player-wrap {
    background: #000;
    position: relative;
    aspect-ratio: 16/9;
    width: 100%;
    max-height: 260px;
    overflow: hidden;
  }
  video {
    width: 100%; height: 100%;
    display: block;
    background: #000;
  }
  .player-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    background: radial-gradient(ellipse at center, rgba(0,0,0,0.15) 0%, transparent 70%);
  }
  .spinner {
    width: 38px; height: 38px;
    border: 2.5px solid rgba(246,173,60,0.15);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
    display: none;
    box-shadow: 0 0 16px var(--accent-glow);
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner.active { display: block; }

  /* ── Now Playing Bar ── */
  .now-playing-bar {
    background: linear-gradient(135deg, #0d1a28 0%, #0a1520 100%);
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .now-playing-bar::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(56,189,248,0.3), transparent);
  }
  .channel-logo-sm {
    width: 36px; height: 36px;
    border-radius: 8px;
    object-fit: contain;
    background: rgba(255,255,255,0.05);
    padding: 3px;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }
  .channel-logo-sm.placeholder {
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700;
    color: var(--accent);
    background: var(--accent-dim);
    border: 1px solid rgba(246,173,60,0.25);
  }
  .now-info { flex: 1; min-width: 0; }
  .now-name {
    font-size: 14px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    color: var(--text);
  }
  .now-status {
    font-size: 11px; color: var(--muted);
    display: flex; align-items: center; gap: 5px; margin-top: 3px;
  }
  .live-dot {
    width: 6px; height: 6px;
    background: var(--green);
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 6px rgba(52,211,153,0.6);
    animation: livepulse 2s ease-in-out infinite;
  }
  @keyframes livepulse {
    0%,100% { box-shadow: 0 0 5px rgba(52,211,153,0.5); }
    50% { box-shadow: 0 0 10px rgba(52,211,153,0.9); }
  }
  .live-dot.error {
    background: var(--red);
    box-shadow: 0 0 6px rgba(248,113,113,0.6);
    animation: none;
  }
  .fullscreen-btn {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    padding: 5px 7px;
    border-radius: 7px;
    transition: all 0.2s;
    flex-shrink: 0;
    line-height: 1;
  }
  .fullscreen-btn:hover {
    color: var(--teal);
    border-color: rgba(56,189,248,0.3);
    background: var(--teal-dim);
  }

  /* ── Quality Selector ── */
  .quality-wrap { position: relative; flex-shrink: 0; }
  .quality-btn {
    background: rgba(246,173,60,0.08);
    border: 1px solid rgba(246,173,60,0.25);
    color: var(--accent);
    font-size: 10px; font-weight: 700;
    padding: 4px 9px; border-radius: 6px;
    cursor: pointer; letter-spacing: 0.5px;
    transition: all 0.2s; white-space: nowrap;
    font-family: 'Inter', monospace;
  }
  .quality-btn:hover {
    background: rgba(246,173,60,0.15);
    box-shadow: 0 0 10px rgba(246,173,60,0.2);
  }
  .quality-btn.hidden { display: none; }
  .quality-menu {
    display: none;
    position: absolute;
    bottom: calc(100% + 8px);
    right: 0;
    background: #0d1a28;
    border: 1px solid var(--border-strong);
    border-radius: 10px;
    overflow: hidden;
    min-width: 130px;
    box-shadow: 0 12px 32px rgba(0,0,0,0.7), 0 0 0 1px rgba(56,189,248,0.05);
    z-index: 200;
  }
  .quality-menu.open { display: block; }
  .quality-menu-title {
    font-size: 9px; color: var(--muted2);
    padding: 8px 12px 5px; letter-spacing: 1px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    font-weight: 600;
  }
  .quality-item {
    padding: 9px 12px; font-size: 13px;
    cursor: pointer; display: flex; align-items: center; gap: 8px;
    transition: background 0.15s; color: var(--muted);
  }
  .quality-item:hover { background: var(--teal-dim); color: var(--text); }
  .quality-item.active { color: var(--accent); }
  .quality-check { width: 14px; font-size: 11px; flex-shrink: 0; }

  /* ── Error Banner ── */
  .err-banner {
    background: rgba(248,113,113,0.08);
    border-bottom: 1px solid rgba(248,113,113,0.2);
    color: #fca5a5;
    font-size: 12px;
    padding: 8px 16px;
    display: none;
    align-items: center;
    gap: 8px;
  }
  .err-banner.show { display: flex; }
  .retry-btn {
    margin-left: auto;
    background: rgba(248,113,113,0.12);
    border: 1px solid rgba(248,113,113,0.25);
    color: #fca5a5;
    font-size: 11px; font-weight: 600;
    padding: 4px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.2s;
    letter-spacing: 0.3px;
  }
  .retry-btn:hover { background: rgba(248,113,113,0.2); }

  /* ── Category Tabs ── */
  .tabs {
    display: flex;
    gap: 0;
    padding: 0 14px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    padding: 11px 15px;
    font-size: 12px; font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    flex-shrink: 0;
    letter-spacing: 0.2px;
  }
  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    text-shadow: 0 0 12px var(--accent-glow);
  }
  .tab:hover:not(.active) { color: var(--text); }

  /* ── Channel Grid ── */
  .channels {
    padding: 10px 10px 80px;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }

  .ch-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 11px 12px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 10px;
    position: relative;
    overflow: hidden;
  }
  .ch-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(56,189,248,0.03) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .ch-card:hover::before { opacity: 1; }
  .ch-card:hover {
    border-color: var(--border-strong);
    background: var(--card-hover);
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  }
  .ch-card:active { transform: scale(0.97) translateY(0); }
  .ch-card.selected {
    border-color: rgba(246,173,60,0.5);
    background: rgba(246,173,60,0.06);
    box-shadow: 0 0 0 1px rgba(246,173,60,0.15), 0 4px 20px rgba(246,173,60,0.08);
  }
  .ch-card.selected::after {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: linear-gradient(180deg, var(--accent), rgba(246,173,60,0.4));
    border-radius: 3px 0 0 3px;
  }
  .ch-logo {
    width: 42px; height: 42px;
    border-radius: 9px;
    object-fit: contain;
    background: rgba(255,255,255,0.05);
    padding: 4px;
    flex-shrink: 0;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .ch-logo-placeholder {
    width: 42px; height: 42px;
    border-radius: 9px;
    background: linear-gradient(135deg, rgba(246,173,60,0.15), rgba(56,189,248,0.08));
    border: 1px solid rgba(246,173,60,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700;
    color: var(--accent);
    flex-shrink: 0;
    letter-spacing: -0.3px;
    text-align: center;
    line-height: 1.2;
  }
  .ch-info { min-width: 0; flex: 1; }
  .ch-name {
    font-size: 12px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    color: var(--text);
  }
  .ch-cat {
    font-size: 10px; color: var(--muted);
    margin-top: 3px; letter-spacing: 0.2px;
  }
  .ch-badge {
    font-size: 8px;
    font-weight: 700;
    padding: 3px 7px;
    border-radius: 20px;
    background: var(--green-dim);
    color: var(--green);
    letter-spacing: 0.8px;
    border: 1px solid rgba(52,211,153,0.2);
    flex-shrink: 0;
  }

  /* ── Sticky player section ── */
  .player-section {
    position: sticky;
    top: 49px;
    z-index: 50;
    background: var(--bg);
  }

  @media (min-width: 600px) {
    .player-wrap { max-height: 380px; }
    .channels { grid-template-columns: repeat(3, 1fr); }
  }
  @media (min-width: 900px) {
    .main-layout { display: grid; grid-template-columns: 1fr 360px; min-height: 100vh; }
    .player-wrap { max-height: none; aspect-ratio: 16/9; }
    .channels { grid-template-columns: repeat(2, 1fr); }
    .sidebar { border-left: 1px solid var(--border); overflow-y: auto; max-height: calc(100vh - 49px); }
    .player-section { position: sticky; top: 49px; }
  }

  /* ── Splash Screen ── */
  #splash {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    transition: opacity 0.6s ease, visibility 0.6s ease;
  }
  #splash.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }
  .splash-logo {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    animation: splashFadeUp 0.7s ease both;
  }
  .splash-logo-title {
    font-size: 36px;
    font-weight: 900;
    letter-spacing: 4px;
    text-transform: uppercase;
    font-style: italic;
    color: var(--text);
  }
  .splash-logo-title span {
    font-style: normal;
    background: linear-gradient(135deg, #f6ad3c, #ffd580, #f6ad3c);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 2.5s linear infinite;
  }
  @keyframes shimmer {
    0% { background-position: 0% center; }
    100% { background-position: 200% center; }
  }
  .splash-tagline {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  @keyframes splashFadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Rings loader */
  .splash-rings {
    position: relative;
    width: 72px;
    height: 72px;
    animation: splashFadeUp 0.7s 0.15s ease both;
  }
  .splash-rings span {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 2.5px solid transparent;
  }
  .splash-rings span:nth-child(1) {
    border-top-color: var(--accent);
    animation: ringSpin 1.1s linear infinite;
  }
  .splash-rings span:nth-child(2) {
    inset: 10px;
    border-top-color: var(--teal);
    animation: ringSpin 0.85s linear infinite reverse;
  }
  .splash-rings span:nth-child(3) {
    inset: 20px;
    border-top-color: rgba(246,173,60,0.5);
    animation: ringSpin 1.4s linear infinite;
  }
  .splash-rings-dot {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .splash-rings-dot::after {
    content: '';
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent-glow), 0 0 24px var(--accent-glow);
    animation: dotPulse 1.1s ease-in-out infinite;
  }
  @keyframes ringSpin { to { transform: rotate(360deg); } }
  @keyframes dotPulse {
    0%,100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.3); opacity: 0.7; }
  }

  /* Loading text + dots */
  .splash-loading-text {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 1.5px;
    display: flex;
    align-items: center;
    gap: 4px;
    animation: splashFadeUp 0.7s 0.3s ease both;
  }
  .splash-loading-text .dot-anim span {
    display: inline-block;
    animation: dotBounce 1.2s ease-in-out infinite;
    font-size: 16px;
    line-height: 1;
    color: var(--accent);
  }
  .splash-loading-text .dot-anim span:nth-child(2) { animation-delay: 0.2s; }
  .splash-loading-text .dot-anim span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotBounce {
    0%,80%,100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-5px); opacity: 1; }
  }

  /* Channel count hint */
  .splash-hint {
    font-size: 11px;
    color: var(--muted2);
    letter-spacing: 0.5px;
    animation: splashFadeUp 0.7s 0.45s ease both;
  }

  /* Scanline overlay effect */
  #splash::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      rgba(0,0,0,0.04) 3px,
      rgba(0,0,0,0.04) 4px
    );
    pointer-events: none;
  }
  /* Ambient glow */
  #splash::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 400px; height: 400px;
    background: radial-gradient(ellipse at center,
      rgba(246,173,60,0.06) 0%,
      rgba(56,189,248,0.04) 40%,
      transparent 70%
    );
    pointer-events: none;
    animation: ambientPulse 3s ease-in-out infinite;
  }
  @keyframes ambientPulse {
    0%,100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    50% { transform: translate(-50%, -50%) scale(1.15); opacity: 0.7; }
  }
</style>
</head>
<body>

<!-- ── Splash Screen ── -->
<div id="splash">
  <div class="splash-logo">
    <div class="splash-logo-title">Riyad<span>TV</span></div>
    <div class="splash-tagline">বাংলাদেশের সেরা লাইভ টিভি</div>
  </div>
  <div class="splash-rings">
    <span></span><span></span><span></span>
    <div class="splash-rings-dot"></div>
  </div>
  <div class="splash-loading-text">
    চ্যানেল লোড হচ্ছে
    <span class="dot-anim"><span>.</span><span>.</span><span>.</span></span>
  </div>
  <div class="splash-hint" id="splash-hint">১৮টি চ্যানেল প্রস্তুত হচ্ছে</div>
</div>

<div class="header">
  <div class="logo-dot"></div>
  <div class="header-title">Riyad<span>TV</span></div>
  <div class="header-sub" id="ch-count"></div>
</div>

<div class="main-layout">
  <div class="player-section">
    <div class="player-wrap">
      <video id="player" autoplay playsinline controls></video>
      <div class="player-overlay"><div class="spinner" id="spinner"></div></div>
    </div>

    <div class="now-playing-bar">
      <div id="np-logo-wrap"></div>
      <div class="now-info">
        <div class="now-name" id="np-name">চ্যানেল বেছে নিন</div>
        <div class="now-status">
          <div class="live-dot" id="live-dot"></div>
          <span id="np-status">প্রস্তুত</span>
        </div>
      </div>
      <div class="quality-wrap" id="quality-wrap">
        <button class="quality-btn hidden" id="quality-btn" onclick="toggleQualityMenu()">AUTO ▾</button>
        <div class="quality-menu" id="quality-menu"></div>
      </div>
      <button class="fullscreen-btn" id="fs-btn" title="ফুলস্ক্রিন" onclick="toggleFS()">⛶</button>
    </div>

    <div class="err-banner" id="err-banner">
      <span>⚠️ স্ট্রিম লোড হচ্ছে না। নেট চেক করুন।</span>
      <button class="retry-btn" onclick="retry()">আবার চেষ্টা</button>
    </div>
  </div>

  <div class="sidebar">
    <div class="tabs" id="tabs"></div>
    <div class="channels" id="channels"></div>
  </div>
</div>

<script>
const CHANNELS = [
  { name:"BTV", cat:"সরকারি", url:"https://owrcovcrpy.gpcdn.net/bpk-tv/1709/output/index.m3u8", logo:"https://ssl.com.bd/sites/default/files/BTV%20Logo%20Gallery.png" },
  { name:"NTV", cat:"বিনোদন", url:"https://owrcovcrpy.gpcdn.net/bpk-tv/1716/output/index.m3u8", logo:"https://www.ntvbd.com/sites/default/files/aggregator/2020/02/17/ntv-channel_0.jpg" },
  { name:"Channel i", cat:"বিনোদন", url:"https://owrcovcrpy.gpcdn.net/bpk-tv/1723/output/index.m3u8", logo:"https://cdn.tvpassport.com/image/station/240x135/channel-i-bangla.png" },
  { name:"ATN Bangla", cat:"বিনোদন", url:"https://owrcovcrpy.gpcdn.net/bpk-tv/1722/output/index.m3u8", logo:"https://upload.wikimedia.org/wikipedia/commons/thumb/2/2e/ATN_Bangla.svg/200px-ATN_Bangla.svg.png" },
  { name:"RTV", cat:"বিনোদন", url:"https://owrcovcrpy.gpcdn.net/bpk-tv/1718/output/index.m3u8", logo:"" },

  { name:"BanglaVision", cat:"বিনোদন", url:"https://owrcovcrpy.gpcdn.net/bpk-tv/1715/output/index.m3u8", logo:"" },

  { name:"Channel 24", cat:"সংবাদ", url:"https://owrcovcrpy.gpcdn.net/bpk-tv/1703/output/index.m3u8", logo:"https://dl.dropbox.com/s/puf12xv5flgbnz5/channel24_bd.png" },
  { name:"ATN News", cat:"সংবাদ", url:"https://owrcovcrpy.gpcdn.net/bpk-tv/1706/output/index.m3u8", logo:"https://dl.dropbox.com/s/4ldi1dp09s8o6bm/atn_news_bd.png" },
  { name:"T Sports", cat:"খেলাধুলা", url:"https://owrcovcrpy.gpcdn.net/bpk-tv/1719/output/index.m3u8", logo:"" },
  { name:"GTV", cat:"খেলাধুলা", url:"https://owrcovcrpy.gpcdn.net/bpk-tv/1720/output/index.m3u8", logo:"" },
  { name:"ATN Music", cat:"সংগীত", url:"https://owrcovcrpy.gpcdn.net/bpk-tv/1717/output/index.m3u8", logo:"" },
  { name:"Deshi TV", cat:"বিনোদন", url:"https://deshitv.deshitv24.net/live/myStream/playlist.m3u8", logo:"https://i.postimg.cc/t4cxjxRj/Deshi-TV.jpg" },
  { name:"Ekushey TV", cat:"বিনোদন", url:"https://ekusheyserver.com/hls-live/livepkgr/_definst_/liveevent/livestream3.m3u8", logo:"https://i.postimg.cc/C15wr1RW/Ekushey-Television-Logo-svg.png" },
];

const CATS = ["সব", ...new Set(CHANNELS.map(c => c.cat))];
let activeCat = "সব";
let currentIdx = -1;
let hlsInstance = null;
let selectedLevel = -1;

const video = document.getElementById("player");
const spinner = document.getElementById("spinner");
const npName = document.getElementById("np-name");
const npStatus = document.getElementById("np-status");
const liveDot = document.getElementById("live-dot");
const errBanner = document.getElementById("err-banner");
const npLogoWrap = document.getElementById("np-logo-wrap");

document.getElementById("ch-count").textContent = CHANNELS.length + " চ্যানেল";

function buildTabs() {
  const tabsEl = document.getElementById("tabs");
  tabsEl.innerHTML = CATS.map(c =>
    `<div class="tab${c===activeCat?' active':''}" onclick="switchCat('${c}')">${c}</div>`
  ).join("");
}

function switchCat(cat) {
  activeCat = cat;
  buildTabs();
  buildGrid();
}

function getInitials(name) {
  return name.replace(/TV|তিভি/gi,"").trim().slice(0,3).toUpperCase();
}

function buildGrid() {
  const list = activeCat === "সব" ? CHANNELS : CHANNELS.filter(c => c.cat === activeCat);
  const el = document.getElementById("channels");
  el.innerHTML = list.map((ch, i) => {
    const realIdx = CHANNELS.indexOf(ch);
    const sel = realIdx === currentIdx;
    const logoHtml = ch.logo
      ? `<img class="ch-logo" src="${ch.logo}" onerror="this.style.display='none';this.nextSibling.style.display='flex'" loading="lazy"><div class="ch-logo-placeholder" style="display:none">${getInitials(ch.name)}</div>`
      : `<div class="ch-logo-placeholder">${getInitials(ch.name)}</div>`;
    return `<div class="ch-card${sel?' selected':''}" onclick="playChannel(${realIdx})">
      ${logoHtml}
      <div class="ch-info">
        <div class="ch-name">${ch.name}</div>
        <div class="ch-cat">${ch.cat}</div>
      </div>
      <div class="ch-badge">LIVE</div>
    </div>`;
  }).join("");
}

function buildQualityMenu(levels) {
  const btn = document.getElementById("quality-btn");
  const menu = document.getElementById("quality-menu");

  if (!levels || levels.length <= 1) {
    btn.classList.add("hidden");
    return;
  }

  btn.classList.remove("hidden");
  selectedLevel = -1;
  updateQualityBtn();

  const items = [{ label: "অটো", level: -1 }, ...levels.map((l, i) => ({
    label: l.height ? l.height + "p" : "লেভেল " + (i + 1),
    level: i
  }))];

  menu.innerHTML = `<div class="quality-menu-title">মান নির্বাচন</div>` +
    items.map(item => `
      <div class="quality-item${item.level === selectedLevel ? ' active' : ''}"
           onclick="setQuality(${item.level})">
        <span class="quality-check">${item.level === selectedLevel ? '✓' : ''}</span>
        ${item.label}
      </div>`).join("");
}

function updateQualityBtn() {
  const btn = document.getElementById("quality-btn");
  if (selectedLevel === -1) {
    btn.textContent = "AUTO ▾";
    btn.style.color = "";
  } else if (hlsInstance && hlsInstance.levels[selectedLevel]) {
    const h = hlsInstance.levels[selectedLevel].height;
    btn.textContent = (h ? h + "p" : "L" + (selectedLevel + 1)) + " ▾";
    btn.style.color = "var(--accent)";
  }
}

function setQuality(level) {
  selectedLevel = level;
  if (hlsInstance) {
    hlsInstance.currentLevel = level;
  }
  updateQualityBtn();

  // Rebuild menu to update checkmarks
  if (hlsInstance) buildQualityMenu(hlsInstance.levels);
  document.getElementById("quality-menu").classList.remove("open");
}

function toggleQualityMenu() {
  document.getElementById("quality-menu").classList.toggle("open");
}

function resetQuality() {
  selectedLevel = -1;
  const btn = document.getElementById("quality-btn");
  btn.classList.add("hidden");
  btn.textContent = "AUTO ▾";
  btn.style.color = "";
  const menu = document.getElementById("quality-menu");
  menu.classList.remove("open");
  menu.innerHTML = "";
}

// Close menu on outside click
document.addEventListener("click", (e) => {
  if (!document.getElementById("quality-wrap").contains(e.target)) {
    document.getElementById("quality-menu").classList.remove("open");
  }
});

function setStatus(msg, isErr=false) {
  npStatus.textContent = msg;
  liveDot.className = "live-dot" + (isErr?" error":"");
}

function showNowPlaying(ch) {
  npName.textContent = ch.name;
  npLogoWrap.innerHTML = ch.logo
    ? `<img class="channel-logo-sm" src="${ch.logo}" onerror="this.style.display='none'" loading="lazy">`
    : `<div class="channel-logo-sm placeholder">${getInitials(ch.name)}</div>`;
}

function retry() {
  if (currentIdx >= 0) playChannel(currentIdx);
}

function playChannel(idx, onReady) {
  if (idx === currentIdx && hlsInstance && !onReady) return;
  currentIdx = idx;
  const ch = CHANNELS[idx];
  errBanner.classList.remove("show");
  resetQuality();

  if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }

  showNowPlaying(ch);
  setStatus("লোড হচ্ছে...");
  spinner.classList.add("active");
  buildGrid();

  if (Hls.isSupported()) {
    hlsInstance = new Hls({
      enableWorker: true,
      lowLatencyMode: true,
      backBufferLength: 30,
    });
    hlsInstance.loadSource(ch.url);
    hlsInstance.attachMedia(video);

    hlsInstance.on(Hls.Events.MANIFEST_PARSED, (e, data) => {
      spinner.classList.remove("active");
      setStatus("লাইভ সম্প্রচার");
      buildQualityMenu(hlsInstance.levels);
      if (selectedLevel !== -1) hlsInstance.currentLevel = selectedLevel;
      video.play().catch(()=>{});
      if (onReady) onReady();
    });

    hlsInstance.on(Hls.Events.ERROR, (e, data) => {
      if (data.fatal) {
        spinner.classList.remove("active");
        setStatus("সংযোগ বিচ্ছিন্ন", true);
        errBanner.classList.add("show");
        if (onReady) onReady(); // dismiss splash even on error
      }
    });

  } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
    video.src = ch.url;
    video.addEventListener("loadedmetadata", () => {
      spinner.classList.remove("active");
      setStatus("লাইভ সম্প্রচার");
      video.play().catch(()=>{});
      if (onReady) onReady();
    }, {once:true});
    video.addEventListener("error", () => {
      spinner.classList.remove("active");
      setStatus("সংযোগ বিচ্ছিন্ন", true);
      errBanner.classList.add("show");
      if (onReady) onReady();
    }, {once:true});
  } else {
    spinner.classList.remove("active");
    setStatus("ব্রাউজার সাপোর্ট নেই", true);
    if (onReady) onReady();
  }
}

function toggleFS() {
  const pw = document.querySelector(".player-wrap");
  if (!document.fullscreenElement) pw.requestFullscreen().catch(()=>{});
  else document.exitFullscreen();
}

buildTabs();
buildGrid();

// ── Splash screen logic ──
const splash = document.getElementById("splash");
const splashHint = document.getElementById("splash-hint");
splashHint.textContent = CHANNELS.length + "টি চ্যানেল প্রস্তুত হচ্ছে";

function dismissSplash() {
  splash.classList.add("hidden");
}

// Auto-dismiss splash after stream is ready OR after max 4s
let splashDismissed = false;
function safeDismissSplash() {
  if (splashDismissed) return;
  splashDismissed = true;
  dismissSplash();
}
const splashTimeout = setTimeout(safeDismissSplash, 4000);

// Play first channel with autoplay — dismiss splash on manifest ready
playChannel(0, () => {
  clearTimeout(splashTimeout);
  safeDismissSplash();
});
</script>
